<div class="chat-heading">
  <div class="heading-left">
    <div class="title">NexusIQ</div>
    <div class="subtitle">Document Fraud Detection</div>
  </div>
  <div class="heading-right">
    <div class="health">
      <span
        class="dot"
        [ngClass]="{ ok: health === 'ok', warn: health && health !== 'ok' }"
      ></span>
      <span class="health-text">{{
        health === "ok" ? "Healthy" : health ? "Down" : "Unknown"
      }}</span>
    </div>
  </div>
</div>
